name: Check Documentation Updates

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  get-configs:
    runs-on: ubuntu-latest
    outputs:
      config-paths: ${{ steps.get-configs.outputs.config_paths }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
      
      - name: Get config paths
        id: get-configs
        run: |
          CONFIG_PATHS=$(python -c "
          import json
          with open('check_updates.json') as f:
              data = json.load(f)
          paths = data.get('config_paths', [])
          print(json.dumps(paths))
          ")
          echo "config_paths=$CONFIG_PATHS" >> $GITHUB_OUTPUT

  check-updates:
    needs: get-configs
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config-path: ${{ fromJson(needs.get-configs.outputs.config-paths) }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Check for updates
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          CONFIG_PATH: ${{ matrix.config-path }}
        run: |
          python -c "
          from scripts.main import run_check_workflow
          run_check_workflow()
          "
      
      - name: Trigger translation workflow
        if: steps.check.outputs.has_updates == 'true'
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: translate-docs.yml
          inputs: |
            {"files": "${{ steps.check.outputs.files }}", "config_path": "${{ matrix.config-path }}"}
          token: ${{ secrets.PAT_TOKEN }}
